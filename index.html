<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Aulas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            color: #333;
        }

        header {
            background: #1B4F8A;
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header h1 { font-size: 24px; }
        header p { font-size: 14px; opacity: 0.8; }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 18px;
            color: #1B4F8A;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e8f0;
        }

        .aulas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .aula-card {
            border: 2px solid #e0e8f0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .aula-card:hover {
            border-color: #1B4F8A;
            background: #f0f4f8;
        }

        .aula-card.seleccionada {
            border-color: #1B4F8A;
            background: #e8f0fb;
        }

        .aula-card h3 { font-size: 16px; color: #1B4F8A; }
        .aula-card p { font-size: 13px; color: #888; margin-top: 5px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: bold;
            color: #555;
        }

        .form-group input, .form-group select {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #1B4F8A;
        }

        .form-group.full { grid-column: 1 / -1; }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-primary { background: #1B4F8A; color: white; }
        .btn-primary:hover { background: #153d6e; }
        .btn-danger { background: #e74c3c; color: white; font-size: 13px; padding: 7px 14px; }
        .btn-danger:hover { background: #c0392b; }

        .mensaje {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .mensaje.exito { background: #d5f0e0; color: #1a5c36; border: 1px solid #a8dbbe; }
        .mensaje.error { background: #fdedec; color: #c0392b; border: 1px solid #f5b7b1; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #1B4F8A;
            color: white;
            padding: 12px 15px;
            text-align: left;
        }

        td {
            padding: 11px 15px;
            border-bottom: 1px solid #e0e8f0;
        }

        tr:hover td { background: #f8fafc; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-activa { background: #d5f0e0; color: #1a5c36; }
        .badge-cancelada { background: #fdedec; color: #c0392b; }

        .empty { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }

        .card-admin h2 { color: #7d3c98; border-bottom-color: #d7bde2; }

        /* CALENDARIO */
        .cal-tabla { width: 100%; border-collapse: collapse; min-width: 600px; }
        .cal-tabla th { background: #1B4F8A; color: white; padding: 8px; font-size: 13px; text-align: center; }
        .cal-tabla td { border: 1px solid #e0e8f0; padding: 4px; vertical-align: top; min-height: 60px; font-size: 12px; }
        .cal-dia-num { font-weight: bold; color: #888; margin-bottom: 4px; }
        .cal-reserva { background: #1B4F8A; color: white; border-radius: 4px; padding: 3px 6px; margin-bottom: 3px; font-size: 11px; cursor: default; }
        .cal-libre { background: #d5f0e0; color: #1a5c36; border-radius: 4px; padding: 3px 6px; margin-bottom: 3px; font-size: 11px; cursor: pointer; }
        .cal-libre:hover { background: #a8dbbe; }
        .cal-cerrado { background: #f5f5f5; }
        .cal-hoy { background: #fffde7; }
        .cal-mes-td { height: 80px; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🏫 Sistema de Reserva de Aulas</h1>
        <p>Instituto — Gestión de espacios</p>
    </div>
</header>

<div class="container">

    <!-- SECCIÓN 0: CALENDARIO -->
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; border:none; padding:0">Calendario de reservas</h2>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn btn-primary" onclick="navegarCalendario(-1)">◀</button>
                <span id="titulo-calendario" style="font-weight:bold; font-size:15px; min-width:200px; text-align:center"></span>
                <button class="btn btn-primary" onclick="navegarCalendario(1)">▶</button>
                <div style="display:flex; gap:5px; margin-left:15px;">
                    <button class="btn btn-primary" id="btn-semana" onclick="cambiarVista('semana')">Semana</button>
                    <button class="btn" id="btn-mes" onclick="cambiarVista('mes')"
                        style="background:#e0e8f0; color:#1B4F8A;">Mes</button>
                </div>
            </div>
        </div>
        <div id="calendario-container" style="overflow-x:auto;">
            <p class="empty">Cargando calendario...</p>
        </div>
    </div>

    <!-- SECCIÓN 1: AULAS -->
    <div class="card">
        <h2>Aulas disponibles</h2>
        <div class="aulas-grid" id="aulas-grid">
            <p class="empty">Cargando aulas...</p>
        </div>
    </div>

    <!-- SECCIÓN 2: NUEVA RESERVA -->
    <div class="card">
        <h2>Nueva reserva</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Aula seleccionada</label>
                <input type="text" id="aula-nombre" placeholder="Seleccioná un aula arriba" readonly>
                <input type="hidden" id="aula-id">
            </div>
            <div class="form-group">
                <label>Tu nombre</label>
                <input type="text" id="docente-nombre" placeholder="Ej: María García">
            </div>
            <div class="form-group">
                <label>Tu email</label>
                <input type="email" id="docente-email" placeholder="tu@instituto.edu">
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Hora de inicio</label>
                <input type="time" id="hora-inicio" onblur="document.getElementById('hora-fin').focus()">
            </div>
            <div class="form-group">
                <label>Hora de fin</label>
                <input type="time" id="hora-fin" onchange="document.getElementById('fecha').blur()">
            </div>
            <div class="form-group full">
                <button class="btn btn-primary" onclick="crearReserva()">Reservar aula</button>
            </div>
        </div>
        <div class="mensaje" id="mensaje-reserva"></div>
    </div>

    <!-- SECCIÓN 3: MIS RESERVAS -->
    <div class="card">
        <h2>Mis reservas</h2>
        <div class="form-grid" style="margin-bottom:15px">
            <div class="form-group">
                <label>Buscar por email</label>
                <input type="email" id="buscar-email" placeholder="tu@instituto.edu">
            </div>
            <div class="form-group" style="justify-content: flex-end;">
                <button class="btn btn-primary" onclick="buscarReservas()">Buscar</button>
            </div>
        </div>
        <div id="tabla-reservas">
            <p class="empty">Ingresá tu email para ver tus reservas</p>
        </div>
        <div class="mensaje" id="mensaje-cancelar"></div>
    </div>

    <!-- SECCIÓN 4: ADMINISTRACIÓN DE FECHAS -->
    <div class="card card-admin">
        <h2>🔒 Administración — Fechas bloqueadas</h2>
        <div class="form-grid" style="margin-bottom: 15px;">
            <div class="form-group">
                <label>Fecha a bloquear</label>
                <input type="date" id="fecha-bloquear">
            </div>
            <div class="form-group">
                <label>Motivo</label>
                <input type="text" id="motivo-bloquear" placeholder="Ej: Feriado nacional, Vacaciones">
            </div>
            <div class="form-group full">
                <button class="btn btn-primary" onclick="agregarFechaBloqueada()">Bloquear fecha</button>
            </div>
        </div>
        <div class="mensaje" id="mensaje-admin"></div>
        <div id="tabla-fechas-bloqueadas">
            <p class="empty">Cargando fechas bloqueadas...</p>
        </div>
    </div>

</div>

<script>
const API = 'https://reserva-aulas.onrender.com';

// ===== CALENDARIO =====
let vistaActual = 'semana';
let fechaBase = new Date();

function cambiarVista(vista) {
    vistaActual = vista;
    document.getElementById('btn-semana').style.background = vista === 'semana' ? '#1B4F8A' : '#e0e8f0';
    document.getElementById('btn-semana').style.color = vista === 'semana' ? 'white' : '#1B4F8A';
    document.getElementById('btn-mes').style.background = vista === 'mes' ? '#1B4F8A' : '#e0e8f0';
    document.getElementById('btn-mes').style.color = vista === 'mes' ? 'white' : '#1B4F8A';
    renderCalendario();
}

function navegarCalendario(dir) {
    if (vistaActual === 'semana') {
        fechaBase.setDate(fechaBase.getDate() + dir * 7);
    } else {
        fechaBase.setMonth(fechaBase.getMonth() + dir);
    }
    renderCalendario();
}

function getLunes(fecha) {
    const d = new Date(fecha);
    const dia = d.getDay();
    const diff = dia === 0 ? -6 : 1 - dia;
    d.setDate(d.getDate() + diff);
    return d;
}

function formatFecha(fecha) {
    return fecha.toISOString().split('T')[0];
}

function formatHora(h) {
    return h.toString().padStart(2, '0') + ':00';
}

const DIAS = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

async function renderCalendario() {
    const container = document.getElementById('calendario-container');
    container.innerHTML = '<p class="empty">Cargando...</p>';

    let fechaInicio, fechaFin;

    if (vistaActual === 'semana') {
        fechaInicio = getLunes(fechaBase);
        fechaFin = new Date(fechaInicio);
        fechaFin.setDate(fechaFin.getDate() + 5);
        document.getElementById('titulo-calendario').textContent =
            `${fechaInicio.getDate()} ${MESES[fechaInicio.getMonth()]} — ${fechaFin.getDate()} ${MESES[fechaFin.getMonth()]} ${fechaFin.getFullYear()}`;
    } else {
        fechaInicio = new Date(fechaBase.getFullYear(), fechaBase.getMonth(), 1);
        fechaFin = new Date(fechaBase.getFullYear(), fechaBase.getMonth() + 1, 0);
        document.getElementById('titulo-calendario').textContent =
            `${MESES[fechaBase.getMonth()]} ${fechaBase.getFullYear()}`;
    }

    try {
        const [resReservas, resAulas, resHorarios] = await Promise.all([
            fetch(`${API}/reservas/calendario?fecha_inicio=${formatFecha(fechaInicio)}&fecha_fin=${formatFecha(fechaFin)}`),
            fetch(`${API}/aulas`),
            fetch(`${API}/horarios`)
        ]);

        const reservas = await resReservas.json();
        const aulas = await resAulas.json();
        const horarios = await resHorarios.json();

        if (vistaActual === 'semana') {
            renderSemana(fechaInicio, reservas, aulas, horarios);
        } else {
            renderMes(fechaInicio, fechaFin, reservas, aulas, horarios);
        }
    } catch (e) {
        container.innerHTML = '<p class="empty">Error al cargar el calendario</p>';
    }
}

function renderSemana(lunes, reservas, aulas, horarios) {
    const hoy = formatFecha(new Date());
    const dias = [];
    for (let i = 0; i < 6; i++) {
        const d = new Date(lunes);
        d.setDate(d.getDate() + i);
        dias.push(d);
    }

    let html = '<table class="cal-tabla"><thead><tr><th>Aula</th>';
    dias.forEach(d => {
        const esFinde = d.getDay() === 0;
        if (!esFinde) {
            const esHoy = formatFecha(d) === hoy;
            html += `<th${esHoy ? ' style="background:#2980b9"' : ''}>${DIAS[d.getDay()-1]}<br>${d.getDate()}/${d.getMonth()+1}</th>`;
        }
    });
    html += '</tr></thead><tbody>';

    aulas.forEach(aula => {
        html += `<tr><td style="font-weight:bold; font-size:12px; background:#f8fafc">${aula.nombre}</td>`;
        dias.forEach(d => {
            if (d.getDay() === 0) return;
            const fechaStr = formatFecha(d);
            const diaConfig = horarios.find(h => h.dia_semana === (d.getDay() === 0 ? 6 : d.getDay() - 1));
            const esHoy = fechaStr === hoy;

            if (!diaConfig || !diaConfig.habilitado) {
                html += `<td class="cal-cerrado"></td>`;
                return;
            }

            const resDelDia = reservas.filter(r => r.fecha === fechaStr && r.aula_id === aula.id);
            let contenido = '';
            resDelDia.forEach(r => {
                contenido += `<div class="cal-reserva">🔒 ${r.hora_inicio.slice(0,5)}-${r.hora_fin.slice(0,5)}<br>${r.docente_nombre}</div>`;
            });

            // Mostrar franja libre si no hay reservas
            if (resDelDia.length === 0) {
                contenido += `<div class="cal-libre" onclick="precargarReserva('${aula.id}','${aula.nombre}','${fechaStr}')">+ Reservar</div>`;
            }

            html += `<td class="${esHoy ? 'cal-hoy' : ''}">${contenido}</td>`;
        });
        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('calendario-container').innerHTML = html;
}

function renderMes(fechaInicio, fechaFin, reservas, aulas, horarios) {
    const hoy = formatFecha(new Date());
    let html = '<table class="cal-tabla"><thead><tr>';
    DIAS.forEach(d => html += `<th>${d}</th>`);
    html += '</tr></thead><tbody><tr>';

    // Espacios vacíos al inicio
    const primerDia = fechaInicio.getDay() === 0 ? 6 : fechaInicio.getDay() - 1;
    for (let i = 0; i < primerDia; i++) html += '<td class="cal-cerrado cal-mes-td"></td>';

    let diaActual = new Date(fechaInicio);
    let col = primerDia;

    while (diaActual <= fechaFin) {
        if (col === 6) { html += '</tr><tr>'; col = 0; }

        const fechaStr = formatFecha(diaActual);
        const diaSemana = diaActual.getDay() === 0 ? 6 : diaActual.getDay() - 1;
        const config = horarios.find(h => h.dia_semana === diaSemana);
        const esHoy = fechaStr === hoy;
        const cerrado = !config || !config.habilitado;
        const resDelDia = reservas.filter(r => r.fecha === fechaStr);

        html += `<td class="cal-mes-td ${cerrado ? 'cal-cerrado' : ''} ${esHoy ? 'cal-hoy' : ''}">
            <div class="cal-dia-num">${diaActual.getDate()}</div>`;

        if (!cerrado) {
            resDelDia.slice(0, 2).forEach(r => {
                html += `<div class="cal-reserva">${r.aula_nombre} ${r.hora_inicio.slice(0,5)}</div>`;
            });
            if (resDelDia.length > 2) {
                html += `<div style="font-size:11px; color:#888">+${resDelDia.length - 2} más</div>`;
            }
        }

        html += '</td>';
        diaActual.setDate(diaActual.getDate() + 1);
        col++;
    }

    // Rellenar última fila
    while (col < 6) { html += '<td class="cal-cerrado cal-mes-td"></td>'; col++; }
    html += '</tr></tbody></table>';
    document.getElementById('calendario-container').innerHTML = html;
}

function precargarReserva(aulaId, aulaNombre, fecha) {
    // Seleccionar el aula visualmente
    document.querySelectorAll('.aula-card').forEach(c => c.classList.remove('seleccionada'));
    const cards = document.querySelectorAll('.aula-card');
    cards.forEach(c => {
        if (c.querySelector('h3').textContent === aulaNombre) {
            c.classList.add('seleccionada');
        }
    });
    document.getElementById('aula-id').value = aulaId;
    document.getElementById('aula-nombre').value = aulaNombre;
    document.getElementById('fecha').value = fecha;

    // Hacer scroll al formulario
    document.getElementById('fecha').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ===== CARGAR AULAS =====
async function cargarAulas() {
    try {
        const res = await fetch(`${API}/aulas`);
        const aulas = await res.json();
        const grid = document.getElementById('aulas-grid');

        if (aulas.length === 0) {
            grid.innerHTML = '<p class="empty">No hay aulas disponibles</p>';
            return;
        }

        grid.innerHTML = aulas.map(a => `
            <div class="aula-card" onclick="seleccionarAula('${a.id}', '${a.nombre}', this)">
                <h3>${a.nombre}</h3>
                <p>Capacidad: ${a.capacidad}</p>
                <p>${a.edificio}</p>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('aulas-grid').innerHTML = '<p class="empty">Error al cargar aulas</p>';
    }
}

function seleccionarAula(id, nombre, el) {
    document.querySelectorAll('.aula-card').forEach(c => c.classList.remove('seleccionada'));
    el.classList.add('seleccionada');
    document.getElementById('aula-id').value = id;
    document.getElementById('aula-nombre').value = nombre;
}

// ===== CREAR RESERVA =====
async function crearReserva() {
    const aulaId = document.getElementById('aula-id').value;
    const nombre = document.getElementById('docente-nombre').value.trim();
    const email = document.getElementById('docente-email').value.trim();
    const fecha = document.getElementById('fecha').value;
    const horaInicio = document.getElementById('hora-inicio').value;
    const horaFin = document.getElementById('hora-fin').value;

    if (!aulaId || !nombre || !email || !fecha || !horaInicio || !horaFin) {
        mostrarMensaje('mensaje-reserva', 'Por favor completá todos los campos', 'error');
        return;
    }

    try {
        // Buscar o crear usuario
        const usuarioRes = await fetch(`${API}/usuarios/buscar?email=${email}`);
        let usuarioId;

        if (usuarioRes.ok) {
            const usuario = await usuarioRes.json();
            usuarioId = usuario.id;
        } else {
            const nuevoUsuario = await fetch(`${API}/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, nombre, rol: 'docente' })
            });
            const u = await nuevoUsuario.json();
            usuarioId = u.id;
        }

        // Crear reserva
        const res = await fetch(`${API}/reservas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                aula_id: aulaId,
                usuario_id: usuarioId,
                fecha,
                hora_inicio: horaInicio + ':00',
                hora_fin: horaFin + ':00'
            })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-reserva', `✅ Reserva creada correctamente`, 'exito');
            document.getElementById('fecha').value = '';
            document.getElementById('hora-inicio').value = '';
            document.getElementById('hora-fin').value = '';
        } else {
            mostrarMensaje('mensaje-reserva', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-reserva', 'Error al conectar con el servidor', 'error');
    }
}

// ===== BUSCAR RESERVAS =====
async function buscarReservas() {
    const email = document.getElementById('buscar-email').value.trim();
    if (!email) return;

    try {
        const res = await fetch(`${API}/reservas/usuario?email=${email}`);
        const reservas = await res.json();
        const contenedor = document.getElementById('tabla-reservas');

        if (!reservas.length) {
            contenedor.innerHTML = '<p class="empty">No se encontraron reservas para ese email</p>';
            return;
        }

        contenedor.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Aula</th>
                        <th>Fecha</th>
                        <th>Horario</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    ${reservas.map(r => `
                        <tr>
                            <td>${r.aula_nombre}</td>
                            <td>${r.fecha}</td>
                            <td>${r.hora_inicio.slice(0,5)} - ${r.hora_fin.slice(0,5)}</td>
                            <td><span class="badge badge-${r.estado}">${r.estado}</span></td>
                            <td>
                                ${r.estado === 'activa' ? `
                                    <button class="btn btn-danger" onclick="cancelarReserva('${r.id}', '${r.usuario_id}')">
                                        Cancelar
                                    </button>
                                ` : '—'}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        document.getElementById('tabla-reservas').innerHTML = '<p class="empty">Error al buscar reservas</p>';
    }
}

// ===== CANCELAR RESERVA =====
async function cancelarReserva(reservaId, usuarioId) {
    if (!confirm('¿Confirmás que querés cancelar esta reserva?')) return;

    try {
        const res = await fetch(`${API}/reservas/${reservaId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reserva_id: reservaId, usuario_id: usuarioId })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-cancelar', '✅ Reserva cancelada correctamente', 'exito');
            buscarReservas();
        } else {
            mostrarMensaje('mensaje-cancelar', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-cancelar', 'Error al cancelar la reserva', 'error');
    }
}

// ===== FECHAS BLOQUEADAS =====
async function cargarFechasBloqueadas() {
    try {
        const res = await fetch(`${API}/fechas-bloqueadas`);
        const fechas = await res.json();
        const contenedor = document.getElementById('tabla-fechas-bloqueadas');

        if (!fechas.length) {
            contenedor.innerHTML = '<p class="empty">No hay fechas bloqueadas</p>';
            return;
        }

        contenedor.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Motivo</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    ${fechas.map(f => `
                        <tr>
                            <td>${f.fecha}</td>
                            <td>${f.motivo}</td>
                            <td>
                                <button class="btn btn-danger" onclick="eliminarFechaBloqueada('${f.fecha}')">
                                    Desbloquear
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        document.getElementById('tabla-fechas-bloqueadas').innerHTML =
            '<p class="empty">Error al cargar fechas</p>';
    }
}

async function agregarFechaBloqueada() {
    const fecha = document.getElementById('fecha-bloquear').value;
    const motivo = document.getElementById('motivo-bloquear').value.trim();

    if (!fecha || !motivo) {
        mostrarMensaje('mensaje-admin', 'Completá la fecha y el motivo', 'error');
        return;
    }

    try {
        const res = await fetch(`${API}/fechas-bloqueadas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha, motivo })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-admin', `✅ ${data.mensaje}`, 'exito');
            document.getElementById('fecha-bloquear').value = '';
            document.getElementById('motivo-bloquear').value = '';
            cargarFechasBloqueadas();
        } else {
            mostrarMensaje('mensaje-admin', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-admin', 'Error al conectar con el servidor', 'error');
    }
}

async function eliminarFechaBloqueada(fecha) {
    if (!confirm(`¿Desbloquear el ${fecha}?`)) return;

    try {
        const res = await fetch(`${API}/fechas-bloqueadas/${fecha}`, {
            method: 'DELETE'
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-admin', `✅ ${data.mensaje}`, 'exito');
            cargarFechasBloqueadas();
        } else {
            mostrarMensaje('mensaje-admin', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-admin', 'Error al conectar con el servidor', 'error');
    }
}

// ===== UTILIDAD =====
function mostrarMensaje(id, texto, tipo) {
    const el = document.getElementById(id);
    el.textContent = texto;
    el.className = `mensaje ${tipo}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}

// Iniciar
// Iniciar
cargarAulas();
cargarFechasBloqueadas();
renderCalendario();
</script>
