<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Espacios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            color: #333;
        }

        header {
            background: #1B4F8A;
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header h1 { font-size: 24px; }
        header p { font-size: 14px; opacity: 0.8; }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 18px;
            color: #1B4F8A;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e8f0;
        }

        .espacios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .espacio-card {
            border: 2px solid #e0e8f0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .espacio-card:hover {
            border-color: #1B4F8A;
            background: #f0f4f8;
        }

        .espacio-card.seleccionada {
            border-color: #1B4F8A;
            background: #e8f0fb;
        }

        .espacio-card h3 { font-size: 16px; color: #1B4F8A; }
        .espacio-card p { font-size: 13px; color: #888; margin-top: 5px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: bold;
            color: #555;
        }

        .form-group input, .form-group select {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #1B4F8A;
        }

        .form-group.full { grid-column: 1 / -1; }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-primary { background: #1B4F8A; color: white; }
        .btn-primary:hover { background: #153d6e; }
        .btn-danger { background: #e74c3c; color: white; font-size: 13px; padding: 7px 14px; }
        .btn-danger:hover { background: #c0392b; }

        .mensaje {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .mensaje.exito { background: #d5f0e0; color: #1a5c36; border: 1px solid #a8dbbe; }
        .mensaje.error { background: #fdedec; color: #c0392b; border: 1px solid #f5b7b1; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #1B4F8A;
            color: white;
            padding: 12px 15px;
            text-align: left;
        }

        td {
            padding: 11px 15px;
            border-bottom: 1px solid #e0e8f0;
        }

        tr:hover td { background: #f8fafc; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-activa { background: #d5f0e0; color: #1a5c36; }
        .badge-cancelada { background: #fdedec; color: #c0392b; }

        .empty { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }

        .card-admin h2 { color: #7d3c98; border-bottom-color: #d7bde2; }

        /* CALENDARIO */
        .cal-tabla { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 12px; }
        .cal-tabla th { background: #1B4F8A; color: white; padding: 8px 6px; font-size: 12px; text-align: center; }
        .cal-tabla td { border: 1px solid #e0e8f0; padding: 4px; text-align: center; height: 45px; }
        .cal-reserva { background: #1B4F8A; color: white; border-radius: 4px; padding: 3px 5px; font-size: 11px; }
        .cal-libre { background: #d5f0e0; color: #1a5c36; border-radius: 4px; padding: 3px 5px; font-size: 11px; cursor: pointer; }
        .cal-libre:hover { background: #a8dbbe; }
        .cal-libre-cell { cursor: pointer; }
        .cal-libre-cell:hover { background: #f0fdf4; }
        .cal-reserva-cell { background: #eef2fb; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🏫 Sistema de Reserva de Espacios</h1>
        <p>Gestión de espacios</p>
    </div>
</header>

<div class="container">

    <!-- SECCIÓN 0: CALENDARIO -->
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
            <h2 style="margin:0; border:none; padding:0">Calendario de reservas</h2>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="navegarCalendario(-1)">◀</button>
                <span id="titulo-calendario" style="font-weight:bold; font-size:15px; min-width:200px; text-align:center"></span>
                <button class="btn btn-primary" onclick="navegarCalendario(1)">▶</button>
                <button class="btn btn-primary" onclick="navegarCalendario(0)">Hoy</button>
                <div style="display:flex; gap:5px; margin-left:10px;">
                    <button class="btn" id="btn-dia" onclick="cambiarVista('dia')"
                        style="background:#1B4F8A; color:white;">Día</button>
                    <button class="btn" id="btn-semana" onclick="cambiarVista('semana')"
                        style="background:#e0e8f0; color:#1B4F8A;">Semana</button>
                </div>
            </div>
        </div>
        <div id="selector-aula-semana" style="display:none; margin-bottom:15px;">
            <label style="font-size:13px; font-weight:bold; color:#555;">Espacio a visualizar:</label>
            <select id="select-espacio-semana" onchange="renderCalendario()"
                style="margin-left:10px; padding:8px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px;">
            </select>
        </div>
        <div id="calendario-container" style="overflow-x:auto;">
            <p class="empty">Cargando calendario...</p>
        </div>
    </div>

    <!-- SECCIÓN 1: AULAS -->
    <div class="card">
        <h2>Espacios disponibles</h2>
        <div class="espacios-grid" id="espacios-grid">
            <p class="empty">Cargando espacios...</p>
        </div>
    </div>

    <!-- SECCIÓN 2: NUEVA RESERVA -->
    <div class="card">
        <h2>Nueva reserva</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Espacio seleccionado</label>
                <input type="text" id="espacio-nombre" placeholder="Seleccioná un espacio arriba" readonly>
                <input type="hidden" id="espacio-id">
            </div>
            <div class="form-group">
                <label>Tu nombre</label>
                <input type="text" id="usuario-nombre" placeholder="Ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label>Tu email</label>
                <input type="email" id="usuario-email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Hora de inicio</label>
                <input type="time" id="hora-inicio" onblur="document.getElementById('hora-fin').focus()">
            </div>
            <div class="form-group">
                <label>Hora de fin</label>
                <input type="time" id="hora-fin" onchange="document.getElementById('fecha').blur()">
            </div>
            <div class="form-group full">
                <button class="btn btn-primary" onclick="crearReserva()">Reservar espacio</button>
            </div>
        </div>
        <div class="mensaje" id="mensaje-reserva"></div>
    </div>

    <!-- SECCIÓN 3: MIS RESERVAS -->
    <div class="card">
        <h2>Mis reservas</h2>
        <div class="form-grid" style="margin-bottom:15px">
            <div class="form-group">
                <label>Buscar por email</label>
                <input type="email" id="buscar-email" placeholder="tu@email.com">
            </div>
            <div class="form-group" style="justify-content: flex-end;">
                <button class="btn btn-primary" onclick="buscarReservas()">Buscar</button>
            </div>
        </div>
        <div id="tabla-reservas">
            <p class="empty">Ingresá tu email para ver tus reservas</p>
        </div>
        <div class="mensaje" id="mensaje-cancelar"></div>
    </div>

    <!-- SECCIÓN 4: ADMINISTRACIÓN DE FECHAS -->
    <div class="card card-admin">
        <h2>🔒 Administración — Fechas bloqueadas</h2>
        <div class="form-grid" style="margin-bottom: 15px;">
            <div class="form-group">
                <label>Fecha a bloquear</label>
                <input type="date" id="fecha-bloquear">
            </div>
            <div class="form-group">
                <label>Motivo</label>
                <input type="text" id="motivo-bloquear" placeholder="Ej: Feriado nacional, Vacaciones">
            </div>
            <div class="form-group full">
                <button class="btn btn-primary" onclick="agregarFechaBloqueada()">Bloquear fecha</button>
            </div>
        </div>
        <div class="mensaje" id="mensaje-admin"></div>
        <div id="tabla-fechas-bloqueadas">
            <p class="empty">Cargando fechas bloqueadas...</p>
        </div>
    </div>

</div>

<script>
const API = 'https://reserva-aulas.onrender.com';

// ===== CALENDARIO =====
let vistaActual = 'dia';
let fechaBase = new Date();

function cambiarVista(vista) {
    vistaActual = vista;
    document.getElementById('btn-dia').style.background = vista === 'dia' ? '#1B4F8A' : '#e0e8f0';
    document.getElementById('btn-dia').style.color = vista === 'dia' ? 'white' : '#1B4F8A';
    document.getElementById('btn-semana').style.background = vista === 'semana' ? '#1B4F8A' : '#e0e8f0';
    document.getElementById('btn-semana').style.color = vista === 'semana' ? 'white' : '#1B4F8A';
    document.getElementById('selector-aula-semana').style.display = vista === 'semana' ? 'block' : 'none';
    renderCalendario();
}

function navegarCalendario(dir) {
    if (dir === 0) {
        fechaBase = new Date();
    } else if (vistaActual === 'dia') {
        fechaBase.setDate(fechaBase.getDate() + dir);
    } else {
        fechaBase.setDate(fechaBase.getDate() + dir * 7);
    }
    renderCalendario();
}

function getLunes(fecha) {
    const d = new Date(fecha);
    const dia = d.getDay();
    const diff = dia === 0 ? -6 : 1 - dia;
    d.setDate(d.getDate() + diff);
    return d;
}

function formatFecha(fecha) {
    return fecha.toISOString().split('T')[0];
}

const DIAS = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEMANA = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

async function renderCalendario() {
    const container = document.getElementById('calendario-container');
    container.innerHTML = '<p class="empty">Cargando...</p>';

    try {
        const [resAulas, resHorarios] = await Promise.all([
            fetch(`${API}/espacios`),
            fetch(`${API}/horarios`)
        ]);
        const aulas = await resAulas.json();
        const horarios = await resHorarios.json();

        // Poblar selector de aula para vista semana
        const selectAula = document.getElementById('select-espacio-semana');
        if (selectAula.options.length === 0) {
            aulas.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.id;
                opt.textContent = a.nombre;
                selectAula.appendChild(opt);
            });
        }

        if (vistaActual === 'dia') {
            await renderDia(aulas, horarios);
        } else {
            await renderSemana(aulas, horarios);
        }
    } catch (e) {
        container.innerHTML = '<p class="empty">Error al cargar el calendario</p>';
    }
}

async function renderDia(aulas, horarios) {
    const hoy = formatFecha(fechaBase);
    const diaSemana = fechaBase.getDay() === 0 ? 6 : fechaBase.getDay() - 1;
    const config = horarios.find(h => h.dia_semana === diaSemana);

    document.getElementById('titulo-calendario').textContent =
        `${DIAS_SEMANA[fechaBase.getDay()]} ${fechaBase.getDate()} de ${MESES[fechaBase.getMonth()]} ${fechaBase.getFullYear()}`;

    if (!config || !config.habilitado) {
        document.getElementById('calendario-container').innerHTML =
            '<p class="empty">No hay disponibilidad este día</p>';
        return;
    }

    const resReservas = await fetch(`${API}/reservas/calendario?fecha_inicio=${hoy}&fecha_fin=${hoy}`);
    const reservas = await resReservas.json();

    // Generar franjas horarias de 1 hora
    const horaAp = parseInt(config.hora_apertura.slice(0,2));
    const horaCi = parseInt(config.hora_cierre.slice(0,2));
    const franjas = [];
    for (let h = horaAp; h < horaCi; h++) {
        franjas.push(h.toString().padStart(2,'0') + ':00');
    }

    let html = '<table class="cal-tabla"><thead><tr>';
    html += '<th style="width:70px">Horario</th>';
    aulas.forEach(a => html += `<th>${a.nombre}</th>`);
    html += '</tr></thead><tbody>';

    franjas.forEach(franja => {
        const horaNum = parseInt(franja.slice(0,2));
        html += `<tr><td style="font-weight:bold; font-size:12px; text-align:center; background:#f8fafc; color:#1B4F8A">${franja}</td>`;

        aulas.forEach(aula => {
            const res = reservas.find(r =>
                r.espacio_id === espacio.id &&
                parseInt(r.hora_inicio.slice(0,2)) <= horaNum &&
                parseInt(r.hora_fin.slice(0,2)) > horaNum
            );

            if (res) {
                html += `<td class="cal-reserva-cell">
                    <div class="cal-reserva">🔒 ${res.usuario_nombre}<br>
                    <small>${res.hora_inicio.slice(0,5)}-${res.hora_fin.slice(0,5)}</small></div>
                </td>`;
            } else {
                const ahora = new Date();
                const fechaFranja = new Date(fechaBase);
                fechaFranja.setHours(horaNum, 0, 0);
                const pasado = fechaFranja < ahora;
                if (pasado) {
                    html += `<td style="background:#f5f5f5"></td>`;
                } else {
                    html += `<td class="cal-libre-cell" onclick="precargarReserva('${espacio.id}','${espacio.nombre}','${hoy}','${franja}')">
                        <div class="cal-libre">+ Reservar</div>
                    </td>`;
                }
            }
        });
        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('calendario-container').innerHTML = html;
}

async function renderSemana(aulas, horarios) {
    const aulaId = document.getElementById('select-espacio-semana').value;
    const aulaNombre = document.getElementById('select-espacio-semana').selectedOptions[0]?.text || '';

    const lunes = getLunes(fechaBase);
    const sabado = new Date(lunes);
    sabado.setDate(sabado.getDate() + 5);

    document.getElementById('titulo-calendario').textContent =
        `${aulaNombre} — ${lunes.getDate()} ${MESES[lunes.getMonth()]} al ${sabado.getDate()} ${MESES[sabado.getMonth()]}`;

    const resReservas = await fetch(`${API}/reservas/calendario?fecha_inicio=${formatFecha(lunes)}&fecha_fin=${formatFecha(sabado)}`);
    const reservas = await resReservas.json();
    const resAula = reservas.filter(r => r.espacio_id === aulaId);

    // Calcular horario máximo de la semana
    let horaMin = 7, horaMax = 20;
    horarios.forEach(h => {
        if (h.habilitado && h.hora_apertura) horaMin = Math.min(horaMin, parseInt(h.hora_apertura.slice(0,2)));
        if (h.habilitado && h.hora_cierre) horaMax = Math.max(horaMax, parseInt(h.hora_cierre.slice(0,2)));
    });

    const dias = [];
    for (let i = 0; i < 6; i++) {
        const d = new Date(lunes);
        d.setDate(d.getDate() + i);
        dias.push(d);
    }

    let html = '<table class="cal-tabla"><thead><tr><th style="width:70px">Horario</th>';
    dias.forEach(d => {
        const diaSemana = d.getDay() === 0 ? 6 : d.getDay() - 1;
        const config = horarios.find(h => h.dia_semana === diaSemana);
        const cerrado = !config || !config.habilitado;
        const esHoy = formatFecha(d) === formatFecha(new Date());
        html += `<th style="${cerrado ? 'background:#888' : ''} ${esHoy ? 'background:#2980b9' : ''}">
            ${DIAS[diaSemana]}<br>${d.getDate()}/${d.getMonth()+1}
        </th>`;
    });
    html += '</tr></thead><tbody>';

    for (let h = horaMin; h < horaMax; h++) {
        const franja = h.toString().padStart(2,'0') + ':00';
        html += `<tr><td style="font-weight:bold; font-size:12px; text-align:center; background:#f8fafc; color:#1B4F8A">${franja}</td>`;

        dias.forEach(d => {
            const diaSemana = d.getDay() === 0 ? 6 : d.getDay() - 1;
            const config = horarios.find(h2 => h2.dia_semana === diaSemana);
            const cerrado = !config || !config.habilitado;
            const fechaStr = formatFecha(d);

            if (cerrado) {
                html += `<td style="background:#f0f0f0"></td>`;
                return;
            }

            const horaApDia = parseInt(config.hora_apertura.slice(0,2));
            const horaCiDia = parseInt(config.hora_cierre.slice(0,2));
            if (h < horaApDia || h >= horaCiDia) {
                html += `<td style="background:#f0f0f0"></td>`;
                return;
            }

            const res = resAula.find(r =>
                r.fecha === fechaStr &&
                parseInt(r.hora_inicio.slice(0,2)) <= h &&
                parseInt(r.hora_fin.slice(0,2)) > h
            );

            if (res) {
                html += `<td class="cal-reserva-cell">
                    <div class="cal-reserva">🔒 ${res.usuario_nombre}<br>
                    <small>${res.hora_inicio.slice(0,5)}-${res.hora_fin.slice(0,5)}</small></div>
                </td>`;
            } else {
                const ahora = new Date();
                const fechaFranja = new Date(d);
                fechaFranja.setHours(h, 0, 0);
                const pasado = fechaFranja < ahora;
                if (pasado) {
                    html += `<td style="background:#f5f5f5"></td>`;
                } else {
                    html += `<td class="cal-libre-cell" onclick="precargarReserva('${aulaId}','${aulaNombre}','${fechaStr}','${franja}')">
                        <div class="cal-libre">+ Reservar</div>
                    </td>`;
                }
            }
        });
        html += '</tr>';
    }

    html += '</tbody></table>';
    document.getElementById('calendario-container').innerHTML = html;
}

function precargarReserva(aulaId, aulaNombre, fecha, hora) {
    document.querySelectorAll('.espacio-card').forEach(c => c.classList.remove('seleccionada'));
    const cards = document.querySelectorAll('.espacio-card');
    cards.forEach(c => {
        if (c.querySelector('h3').textContent === aulaNombre) {
            c.classList.add('seleccionada');
        }
    });
    document.getElementById('espacio-id').value = aulaId;
    document.getElementById('espacio-nombre').value = aulaNombre;
    document.getElementById('fecha').value = fecha;
    if (hora) document.getElementById('hora-inicio').value = hora;
    document.getElementById('fecha').scrollIntoView({ behavior: 'smooth', block: 'center' });
}
// ===== CARGAR AULAS =====
async function cargarEspacios() {
    try {
        const res = await fetch(`${API}/espacios`);
        const aulas = await res.json();
        const grid = document.getElementById('espacios-grid');

        if (aulas.length === 0) {
            grid.innerHTML = '<p class="empty">No hay espacios disponibles</p>';
            return;
        }

        grid.innerHTML = aulas.map(a => `
            <div class="espacio-card" onclick="seleccionarEspacio('${a.id}', '${a.nombre}', this)">
                <h3>${a.nombre}</h3>
                <p>Capacidad: ${a.capacidad}</p>
                <p>${a.edificio}</p>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('espacios-grid').innerHTML = '<p class="empty">Error al cargar espacios</p>';
    }
}

function seleccionarEspacio(id, nombre, el) {
    document.querySelectorAll('.espacio-card').forEach(c => c.classList.remove('seleccionada'));
    el.classList.add('seleccionada');
    document.getElementById('espacio-id').value = id;
    document.getElementById('espacio-nombre').value = nombre;
}

// ===== CREAR RESERVA =====
async function crearReserva() {
    const aulaId = document.getElementById('espacio-id').value;
    const nombre = document.getElementById('usuario-nombre').value.trim();
    const email = document.getElementById('usuario-email').value.trim();
    const fecha = document.getElementById('fecha').value;
    const horaInicio = document.getElementById('hora-inicio').value;
    const horaFin = document.getElementById('hora-fin').value;

    if (!aulaId || !nombre || !email || !fecha || !horaInicio || !horaFin) {
        mostrarMensaje('mensaje-reserva', 'Por favor completá todos los campos', 'error');
        return;
    }

    try {
        // Buscar o crear usuario
        const usuarioRes = await fetch(`${API}/usuarios/buscar?email=${email}`);
        let usuarioId;

        if (usuarioRes.ok) {
            const usuario = await usuarioRes.json();
            usuarioId = usuario.id;
        } else {
            const nuevoUsuario = await fetch(`${API}/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, nombre, rol: 'usuario' })
            });
            const u = await nuevoUsuario.json();
            usuarioId = u.id;
        }

        // Crear reserva
        const res = await fetch(`${API}/reservas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                espacio_id: aulaId,
                usuario_id: usuarioId,
                fecha,
                hora_inicio: horaInicio + ':00',
                hora_fin: horaFin + ':00'
            })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-reserva', `✅ Reserva creada correctamente`, 'exito');
            document.getElementById('fecha').value = '';
            document.getElementById('hora-inicio').value = '';
            document.getElementById('hora-fin').value = '';
            renderCalendario();
        } else {
            mostrarMensaje('mensaje-reserva', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-reserva', 'Error al conectar con el servidor', 'error');
    }
}

// ===== BUSCAR RESERVAS =====
async function buscarReservas() {
    const email = document.getElementById('buscar-email').value.trim();
    if (!email) return;

    try {
        const res = await fetch(`${API}/reservas/usuario?email=${email}`);
        const reservas = await res.json();
        const contenedor = document.getElementById('tabla-reservas');

        if (!reservas.length) {
            contenedor.innerHTML = '<p class="empty">No se encontraron reservas para ese email</p>';
            return;
        }

        contenedor.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Espacio</th>
                        <th>Fecha</th>
                        <th>Horario</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    ${reservas.map(r => `
                        <tr>
                            <td>${r.espacio_nombre}</td>
                            <td>${r.fecha}</td>
                            <td>${r.hora_inicio.slice(0,5)} - ${r.hora_fin.slice(0,5)}</td>
                            <td><span class="badge badge-${r.estado}">${r.estado}</span></td>
                            <td>
                                ${r.estado === 'activa' ? `
                                    <button class="btn btn-danger" onclick="cancelarReserva('${r.id}', '${r.usuario_id}')">
                                        Cancelar
                                    </button>
                                ` : '—'}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        document.getElementById('tabla-reservas').innerHTML = '<p class="empty">Error al buscar reservas</p>';
    }
}

// ===== CANCELAR RESERVA =====
async function cancelarReserva(reservaId, usuarioId) {
    if (!confirm('¿Confirmás que querés cancelar esta reserva?')) return;

    try {
        const res = await fetch(`${API}/reservas/${reservaId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reserva_id: reservaId, usuario_id: usuarioId })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-cancelar', '✅ Reserva cancelada correctamente', 'exito');
            buscarReservas();
        } else {
            mostrarMensaje('mensaje-cancelar', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-cancelar', 'Error al cancelar la reserva', 'error');
    }
}

// ===== FECHAS BLOQUEADAS =====
async function cargarFechasBloqueadas() {
    try {
        const res = await fetch(`${API}/fechas-bloqueadas`);
        const fechas = await res.json();
        const contenedor = document.getElementById('tabla-fechas-bloqueadas');

        if (!fechas.length) {
            contenedor.innerHTML = '<p class="empty">No hay fechas bloqueadas</p>';
            return;
        }

        contenedor.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Motivo</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    ${fechas.map(f => `
                        <tr>
                            <td>${f.fecha}</td>
                            <td>${f.motivo}</td>
                            <td>
                                <button class="btn btn-danger" onclick="eliminarFechaBloqueada('${f.fecha}')">
                                    Desbloquear
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        document.getElementById('tabla-fechas-bloqueadas').innerHTML =
            '<p class="empty">Error al cargar fechas</p>';
    }
}

async function agregarFechaBloqueada() {
    const fecha = document.getElementById('fecha-bloquear').value;
    const motivo = document.getElementById('motivo-bloquear').value.trim();

    if (!fecha || !motivo) {
        mostrarMensaje('mensaje-admin', 'Completá la fecha y el motivo', 'error');
        return;
    }

    try {
        const res = await fetch(`${API}/fechas-bloqueadas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha, motivo })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-admin', `✅ ${data.mensaje}`, 'exito');
            document.getElementById('fecha-bloquear').value = '';
            document.getElementById('motivo-bloquear').value = '';
            cargarFechasBloqueadas();
        } else {
            mostrarMensaje('mensaje-admin', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-admin', 'Error al conectar con el servidor', 'error');
    }
}

async function eliminarFechaBloqueada(fecha) {
    if (!confirm(`¿Desbloquear el ${fecha}?`)) return;

    try {
        const res = await fetch(`${API}/fechas-bloqueadas/${fecha}`, {
            method: 'DELETE'
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje('mensaje-admin', `✅ ${data.mensaje}`, 'exito');
            cargarFechasBloqueadas();
        } else {
            mostrarMensaje('mensaje-admin', `❌ ${data.detail}`, 'error');
        }
    } catch (e) {
        mostrarMensaje('mensaje-admin', 'Error al conectar con el servidor', 'error');
    }
}

// ===== UTILIDAD =====
function mostrarMensaje(id, texto, tipo) {
    const el = document.getElementById(id);
    el.textContent = texto;
    el.className = `mensaje ${tipo}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}


// Iniciar — despertar servidor primero
async function iniciar() {
    try {
        await fetch(`${API}/`);
        // Esperar 3 segundos para que Render despierte completamente
        await new Promise(resolve => setTimeout(resolve, 3000));
    } catch(e) {
        await new Promise(resolve => setTimeout(resolve, 3000));
    }
    cargarEspacios();
    cargarFechasBloqueadas();
    renderCalendario();
}

iniciar();
</script>
